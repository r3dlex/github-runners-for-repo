name: deptry-pip-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deptry-pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: deptry
        run: uv run deptry .

      - name: pip-audit
        run: uv run pip-audit
