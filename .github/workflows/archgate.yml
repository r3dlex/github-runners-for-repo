name: archgate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  archgate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup archgate
        # archgate v0.43+ ships a bundled TypeScript runtime (bun + node),
        # so no `actions/setup-node@v4` step is needed.
        # archgate-runtime: bundled
        uses: archgate/setup-action@v1
      - name: archgate check
        # archgate-runtime: bundled
        run: archgate check
