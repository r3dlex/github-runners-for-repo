name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build
        run: uv build

      - name: Verify entry point exists in built wheel
        run: |
          python -c "
          import zipfile, sys
          with zipfile.ZipFile('dist/' + [f for f in __import__('os').listdir('dist') if f.endswith('.whl')][0]) as z:
              names = z.namelist()
              entry = [n for n in names if n.endswith('github_runners_for_repo/cli.py')]
              assert entry, 'cli.py not found in wheel'
              print('entry point OK:', entry[0])
          "

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
