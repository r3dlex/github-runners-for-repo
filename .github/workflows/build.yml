name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install project dependencies
        run: poetry install

      - name: Install pipeline-runner
        run: pip install ./tools/pipeline_runner

      - name: Build
        run: pipeline-runner build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
