name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  _test-self-hosted:
    name: "Test (self-hosted)"
    runs-on: [self-hosted, ubuntu-latest]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Test
        run: uv run pytest

  _test-gate:
    name: "Test gate"
    needs: _test-self-hosted
    if: always()
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.check.outputs.passed }}
    steps:
      - id: check
        if: needs._test-self-hosted.result == 'success'
        run: echo "passed=true" >> "$GITHUB_OUTPUT"

  test:
    name: "Test"
    needs: [_test-self-hosted, _test-gate]
    if: always()
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Route
        run: echo "self-hosted passed=${{ needs._test-gate.outputs.passed }}"

      - if: needs._test-gate.outputs.passed != 'true'
        uses: actions/checkout@v4

      - name: Install uv
        if: needs._test-gate.outputs.passed != 'true'
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        if: needs._test-gate.outputs.passed != 'true'
        run: uv sync --frozen

      - name: Test
        if: needs._test-gate.outputs.passed != 'true'
        run: uv run pytest
