name: secrets-scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  _secrets-scan-self-hosted:
    name: "secrets-scan (self-hosted)"
    runs-on: [self-hosted, ubuntu-latest]
    continue-on-error: true
    outputs:
      passed: ${{ steps.mark.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
      - id: mark
        if: success()
        run: echo "passed=true" >> "$GITHUB_OUTPUT"

  secrets-scan:
    name: "secrets-scan"
    needs: _secrets-scan-self-hosted
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Route
        run: echo "self-hosted passed=${{ needs._secrets-scan-self-hosted.outputs.passed }}"

      - if: needs._secrets-scan-self-hosted.outputs.passed != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        if: needs._secrets-scan-self-hosted.outputs.passed != 'true'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
