name: pr-issue-link

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  _pr-issue-link-self-hosted:
    name: "pr-issue-link (self-hosted)"
    runs-on: [self-hosted, ubuntu-latest]
    continue-on-error: true
    outputs:
      passed: ${{ steps.mark.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv
      - name: Determine referenced issue state
        id: state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          python - <<'PY' > /tmp/issue_state.txt
          import os, re, sys, json, urllib.request
          body = os.environ.get("PR_BODY", "")
          m = re.search(r"(?im)^\s*(?:closes|fixes|resolves)\s+#(\d+)\b", body)
          if not m:
              print("NONE", end="")
              sys.exit(0)
          n = m.group(1)
          repo = os.environ["GITHUB_REPOSITORY"]
          url = f"https://api.github.com/repos/{repo}/issues/{n}"
          req = urllib.request.Request(url, headers={
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
              "X-GitHub-Api-Version": "2022-11-28",
          })
          with urllib.request.urlopen(req) as r:
              data = json.load(r)
          print(data.get("state", "UNKNOWN"), end="")
          PY
          echo "issue_state=$(cat /tmp/issue_state.txt)" >> "$GITHUB_OUTPUT"
      - name: Run check_pr_link.py
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_ISSUE_STATE: ${{ steps.state.outputs.issue_state }}
        run: python tools/check_pr_link.py
      - id: mark
        if: success()
        run: echo "passed=true" >> "$GITHUB_OUTPUT"

  pr-issue-link:
    name: "pr-issue-link"
    needs: _pr-issue-link-self-hosted
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Route
        run: echo "self-hosted passed=${{ needs._pr-issue-link-self-hosted.outputs.passed }}"

      - if: needs._pr-issue-link-self-hosted.outputs.passed != 'true'
        uses: actions/checkout@v4

      - if: needs._pr-issue-link-self-hosted.outputs.passed != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: needs._pr-issue-link-self-hosted.outputs.passed != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Determine referenced issue state
        if: needs._pr-issue-link-self-hosted.outputs.passed != 'true'
        id: state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          python - <<'PY' > /tmp/issue_state.txt
          import os, re, sys, json, urllib.request
          body = os.environ.get("PR_BODY", "")
          m = re.search(r"(?im)^\s*(?:closes|fixes|resolves)\s+#(\d+)\b", body)
          if not m:
              print("NONE", end="")
              sys.exit(0)
          n = m.group(1)
          repo = os.environ["GITHUB_REPOSITORY"]
          url = f"https://api.github.com/repos/{repo}/issues/{n}"
          req = urllib.request.Request(url, headers={
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
              "X-GitHub-Api-Version": "2022-11-28",
          })
          with urllib.request.urlopen(req) as r:
              data = json.load(r)
          print(data.get("state", "UNKNOWN"), end="")
          PY
          echo "issue_state=$(cat /tmp/issue_state.txt)" >> "$GITHUB_OUTPUT"

      - name: Run check_pr_link.py
        if: needs._pr-issue-link-self-hosted.outputs.passed != 'true'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_ISSUE_STATE: ${{ steps.state.outputs.issue_state }}
        run: python tools/check_pr_link.py
