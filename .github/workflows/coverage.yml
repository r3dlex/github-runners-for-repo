name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Coverage
        run: uv run pytest --cov=github_runners_for_repo --cov-report=xml --cov-fail-under=95

      - name: Coverage threshold drift guard (AC-22)
        run: uv run python tools/check_cov_threshold_drift.py
